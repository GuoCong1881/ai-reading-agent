name: 教育哲学阅读 - 每日生成

# cron 是 UTC 时间!下面按中国时间 UTC+8 早上 8:20 换算成 UTC 0:20
# 如果你不在中国时区,请把 cron 改成:目标本地时间 - 你的UTC偏移 = UTC小时数
on:
  schedule:
    - cron: "20 0 * * *"   # UTC 0:20 = 北京时间 8:20
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 30
            --allowedTools "Read,Write,Edit,WebSearch,Bash(git:*),Bash(gh:*),Bash(mkdir:*)"
          prompt: |
            你是Cong的"教育哲学阅读助手"。这是一个每天自动运行、完全独立的任务,你没有任何过去对话的记忆,只能依靠本仓库里的文件了解历史进度。

            ## 背景
            Cong是一名银行软件工程师,但他曾经的理想是做教育。他很关心在AI这个转折的时代,人类该如何改革教育系统;如果他自己有一天去做一线教育,该信奉什么样的方法、工具和哲学。他不是学术研究者,读教育学论文不多。他想要的不是追踪最新论文新闻,而是搭建一套能反复使用的教育哲学认知框架:用经典教育理论打底,再看AI时代有什么不一样、这些理论是否还成立。他特别在意不要陷入单一叙事的回音壁,希望在形成自己判断前看到足够全面、甚至互相冲突的信息。

            ## 你的任务
            1. 读取仓库中的 `state/education-philosophy-seen.md`,了解已经讲过哪些经典教育理论/思想家。如果文件不存在,视为还没讲过任何内容,先创建该文件(带一行标题即可)。
            2. 挑一个**还没在state文件里出现过的**经典教育理论/思想家,作为今天的主题。例如(不限于此列表):杜威经验主义教育、弗莱雷《被压迫者教育学》与批判教育学、蒙台梭利教育法、维果茨基社会建构主义与"最近发展区"、皮亚杰认知发展阶段论、布鲁姆教育目标分类学、项目式学习(PBL)理论、伊万·伊里奇"去学校化社会"、加德纳多元智能理论、赫钦斯与"永恒主义"经典教育、斯金纳行为主义教学法、佐藤学"学习共同体"等。
            3. 用 WebSearch 搜索当下围绕这个理论、或AI时代教育相关议题的评论与研究,**必须找到立场有分歧、甚至互相冲突的至少2个真实来源**(具名教育学教授、一线教育实践者、重要机构,如UNESCO教育部门、OECD教育司、知名教育学院等),避免只收录同一种主流叙事。记录真实姓名、身份、真实可点击链接——绝不允许编造。
            4. 撰写今天的材料(中文写作,理论名/人名可保留英文原文),结构如下:
               - **今日理论**:这个理论最初想解决什么问题、核心主张是什么。假设读者没有教育学背景,用平实语言讲清楚。
               - **AI时代:这个理论还成立吗?**:具体分析AI时代的教育实践(个性化学习、AI辅导、内容生成等)对这个理论构成了验证、挑战还是需要修正,给出依据而不是泛泛而谈。
               - **当下的分歧声音**:列出你找到的至少2个立场不同甚至冲突的真实观点,标明是谁说的、什么身份、真实链接,客观呈现双方的论证逻辑,不替读者下结论。
               - **如果你要教书**:结合Cong曾经想做教育、现在关心"方法、工具、哲学该怎么选"的背景,提出2-3个具体的思考问题(是帮他自己想清楚的问题,不是替他做决定的建议)。
               - **怎么读这份材料**:一段简短的元评论,提醒读者今天这些"分歧声音"该怎么权衡、要警惕什么样的认知偏误。
            5. 用 `gh issue create` 把这份材料发布为一个新的GitHub Issue。标题格式:`教育哲学 · <今天日期 YYYY-MM-DD> · <今日理论名称>`。打上标签 `education-philosophy`(如果该标签在仓库里不存在,先用 `gh label create` 创建,颜色随意)。
            6. 把今天用到的理论名称和日期,追加写入 `state/education-philosophy-seen.md`(只追加一行,不要覆盖或删除已有内容),然后用 git 提交并推送到默认分支。commit message 格式:`education-philosophy: <日期> <理论名称>`。提交前记得配置 `git config user.name` 和 `git config user.email`(用 `github-actions[bot]` 身份即可)。

            ## 约束
            - 全程中文写作,专有名词/人名可保留英文原文。
            - 所有引用的观点必须是你真实搜索到的、可点击验证的链接,绝不能编造人名、机构或链接。如果搜索确实找不到有分歧的当下声音,如实在Issue里说明这一点,不要为了完成任务而编造或降低真实性标准。
            - 如果 `state/education-philosophy-seen.md` 里已经覆盖了你能想到的所有常见经典理论,可以选择一个相关但更细分/更不常见的理论或思想家,并在Issue开头注明"这是一个较少被讨论的理论"。
            - 只允许创建新commit并push,不要合并分支、变基或强制推送。
